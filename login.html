<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Pulsakerenzz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-visual">
        <a class="brand" href="index.html"><span class="brand-bag">PK</span><span><strong>Pulsakerenzz</strong><small>.com</small></span></a>
        <h1>Masuk, cek saldo, dan belanja produk digital favorit.</h1>
        <div class="auth-benefits">
          <span>Voucher member</span>
          <span>Riwayat pesanan</span>
          <span>Nomor tersimpan</span>
          <span>Admin demo</span>
        </div>
      </section>

      <section class="auth-card">
        <span class="badge">Demo login static</span>
        <h1>Selamat datang kembali</h1>
        <p>Tombol masuk membuka dashboard user. Tombol admin membuka CMS demo tanpa backend.</p>
        <form onsubmit="event.preventDefault(); location.href='dashboard.html';">
          <label><span>Email / nomor HP</span><input type="text" value="budi@pulsakerenzz.com" /></label>
          <label><span>Password</span><input type="password" value="password" /></label>
          <button class="solid-link full" type="submit">Masuk Dashboard</button>
        </form>
        <a class="outline-link full" href="admin.html">Masuk Admin CMS</a>
        <a class="ghost-link" href="index.html">Kembali ke marketplace</a>
      </section>
    </main>
  </body>
</html>
